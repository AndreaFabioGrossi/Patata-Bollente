apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-applications
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AndreaFabioGrossi/Patata-Bollente.git
    targetRevision: HEAD
    path: apps
  destination:
    server: https://default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
