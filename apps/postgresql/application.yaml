apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  source:
    repoURL: https://github.com/AndreaFabioGrossi/Patata-Bollente.git
    targetRevision: HEAD
    path: apps/postgresql
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true  # Crea automaticamente il namespace "database"
