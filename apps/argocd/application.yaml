apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  destination:
    server: https://default.svc   # Sistemato endpoint interno
    namespace: argocd
  sources:
    - repoURL: https://github.io  # Sistemato URL Helm ufficiale
      chart: argo-cd
      targetRevision: 7.3.11  # Versione stabile del chart Helm di Argo CD
      ref: chart-ufficiale
    - repoURL: https://github.com/AndreaFabioGrossi/Patata-Bollente.git
      targetRevision: HEAD
      path: argocd
      helm:
        valueFiles:
          - $chart-ufficiale/values.yaml
          - values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
