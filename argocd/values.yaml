global:
  # Disabilita l'obbligo di HTTPS per i test locali su Mac
  secure: false

server:
  extraArgs:
    - --insecure

  # Crea automaticamente una regola Ingress per accedere dal browser
  ingress:
    enabled: true
    ingressClassName: cilium # Dice a Cilium di gestire questo indirizzo web
    hostname: argocd.local
    path: /
    pathType: Prefix
